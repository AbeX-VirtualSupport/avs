<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Abegail Mercado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(135deg,#f7fbfa,#eef6f4);} 
    .thank-you-card{max-width:620px;background:#fff;border:1px solid var(--line);border-radius:24px;padding:42px 36px;box-shadow:0 20px 60px rgba(7,61,67,.12);text-align:center;} 
    .thank-you-card h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,2.8rem);margin:0 0 14px;color:var(--teal-950);} 
    .thank-you-card p{color:var(--muted);font-size:1.02rem;line-height:1.7;margin:0 0 20px;} 
    .thank-you-card a{display:inline-flex;align-items:center;justify-content:center;padding:12px 18px;border-radius:999px;background:var(--teal-900);color:#fff;font-weight:700;} 
  </style>
</head>
<body>
  <main class="thank-you-card">
    <h1>Thank you for reaching out!</h1>
    <p>Your message has been received. I’ll get back to you as soon as possible, usually within 24 hours.</p>
    <a href="index.html">Return to portfolio</a>
  </main>
</body>
</html>
